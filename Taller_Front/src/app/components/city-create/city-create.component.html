<div class="card mb-4">
  <div class="card-body">
    <h5 class="card-title">Nueva Ciudad</h5>

    <div class="mb-3">
      <label for="cityName" class="form-label"><strong>Nombre de la ciudad</strong></label>
      <input
        type="text"
        class="form-control"
        id="cityName"
        name="cityName"
        [(ngModel)]="cityName"
        required
      />
    </div>

    <div class="mb-3">
      <label for="country" class="form-label"><strong>País</strong></label>
      <select
        class="form-select"
        id="country"
        name="country"
        [(ngModel)]="selectedCountryId"
      >
        <option [ngValue]="null" disabled>Seleccione un país...</option>
        @for (c of countries; track c.id) {
          <option [ngValue]="c.id">{{ c.name }} ({{ c.isoCode }})</option>
        }
      </select>
    </div>

    <button type="button" class="btn btn-primary me-2" (click)="save()" [disabled]="isInvalid()">
      Guardar
    </button>
    <button type="button" class="btn btn-secondary" (click)="onCancel()">
      Cancelar
    </button>
  </div>
</div>
